<!DOCTYPE html>

<html lang="en">
<head>
    <title>VEX Parts Inventory Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>VEX Parts Inventory</h1>

    <input type="text" id="searchBar" placeholder="Search a part..." oninput="searchPart()">
    <button>Search</button>
    <button id="deleteInventoryBtn" onclick="clearTable()">Delete Inventory</button>

    <br><br>
    <div style="display: flex; justify-content: space-between;">
        <!--Left Table-->
        <div>
            <button id="addPartBtn" onclick="document.getElementById('addDialog').showModal()">Add Part</button>
            <br><br>
            <table border="1">
                <thead>
                    <tr>
                        <th>Part Name</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Condition</th>
                        <th>Threshold</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody id="partsTable"></tbody>
            </table>
        </div>

        <!--Right Table-->
        <div>
            <button onclick="document.getElementById('uploadBom').click()">Import BoM Table CSV</button>
            <input type="file" id="uploadBom" accept=".csv" style="display:none" onchange="importBom(event)">
            <br><br>
            <table border="1">
                <thead>
                    <tr>
                        <th>Part Name</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Status</th>
                        <th>Part #</th>
                    </tr>
                </thead>
                <tbody id="bomTable"></tbody>
            </table>
        </div>
    </div>

    <dialog id="addDialog">
        <h2>Add Part</h2>

        <label>Part Name:</label>
        <input type="text" id="partName">
        <br>
        <label>Category:</label>
        <select id="partCategory">
            <option>Structure</option>
            <option>Electronics</option>
            <option>Pneumatics</option>
            <option>Wheels</option>
        </select>
        <br>
        <label>Quantity:</label>
        <input type="number" id="partQty" value="0" min="0">
        <br>
        <label>Condition:</label>
        <select id="partCondition">
            <option>Good</option>
            <option>Bent</option>
            <option>Damaged</option>
        </select>
        <br>
        <label>Low Stock Threshold:</label>
        <input type="number" id="partThreshold" value="5" min="0">
        <br>
        <button type="button" onclick="addPart()">Add Part</button>
        <button type="button" onclick="document.getElementById('addDialog').close()">Cancel</button>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
