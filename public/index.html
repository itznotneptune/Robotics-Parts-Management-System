<!DOCTYPE html>

<html lang="en">
<head>
    <title>VEX Parts Inventory Management System</title>
</head>

<body>

    <h1>VEX Parts Inventory</h1>

    <input type="text" placeholder="Search a part...">
    <button>Search</button>

    <br><br>
    <button onclick="document.getElementById('addDialog').showModal()">Add Part</button>

    <table border="1">
        <thead>
            <tr>
                <th>Part Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Condition</th>
            </tr>
        </thead>
    <tbody id="partsTable">
        <tr>
            <td>V5 Smart Motor</td>
            <td>Motors</td>
            <td>8</td>
            <td>Good</td>
        </tr>
        <tr>
            <td>1x2x1x35 C-Channel (6 Pack)</td>
            <td>Structure</td>
            <td>15</td>
            <td>Good</td>
        </tr>
    </tbody>
    </table>

    <dialog id="addDialog">
        <h2>Add Part</h2>

        <label>Part Name:</label>
        <input type="text" id="partName">
        <br>
        <label>Category:</label>
        <select id="partCategory">
            <option>Structure</option>
            <option>Electronics</option>
            <option>Pneumatics</option>
            <option>Wheels</option>
        </select>
        <br>
        <label>Quantity:</label>
        <input type="number" id="partQty" value="0" min="0">
        <br>
        <label>Condition:</label>
        <select id="partCondition">
            <option>Good</option>
            <option>Bent</option>
            <option>Damaged</option>
        </select>
        <br>
        <button type="button" onclick="addPart()">Add Part</button>
        <button type="button" onclick="document.getElementById('addDialog').close()">Cancel</button>
    </dialog>

    <script>
        function addPart() {
            var name = document.getElementById("partName").value;
            var category = document.getElementById("partCategory").value;
            var qty = document.getElementById("partQty").value;
            var condition = document.getElementById("partCondition").value;

            var newRow = "<tr><td>" + name + "</td><td>" + category + "</td><td>" + qty + "</td><td>" + condition + "</td></tr>";
            document.getElementById("partsTable").innerHTML += newRow;

            document.getElementById("addDialog").close();
        }
    </script>
</body>
</html>
